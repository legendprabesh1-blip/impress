<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Journey</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="hh.mp3.mpeg" type="audio/mpeg">
    </audio>

    <div class="main-container">
        <!-- Page 1: Love Mail -->
        <section id="page1" class="page active">
            <div class="floating-hearts"></div>
            <div class="mail-section">
                <div class="envelope" id="envelope">
                    <div class="letter">LOVE MAIL</div>
                    <i class="fas fa-heart heart-seal"></i>
                </div>
                <p class="instruction">Click to reveal love & start music!</p>
            </div>
            
            <div class="teddy-container" id="teddyBox">
                <img src="https://img.icons8.com/emoji/160/000000/teddy-bear-emoji.png" alt="Teddy">
                <div class="surprise-card">
                    <h3>Surprise!</h3>
                    <p>A message just for you!</p>
                    <button class="nav-btn" onclick="nextPage(2)">Open it</button>
                </div>
            </div>
        </section>

        <!-- Page 2: The Question -->
        <section id="page2" class="page">
            <div class="question-container">
                <img src="https://img.icons8.com/emoji/160/000000/teddy-bear-emoji.png" class="asking-teddy">
                <h2 class="question-text">Do u like me a lot?</h2>
                <div class="btn-group">
                    <button class="yes-btn" onclick="nextPage(3)">YES!</button>
                    <button class="no-btn" id="noBtn">NO</button>
                </div>
            </div>
        </section>

        <!-- Page 3: Romantic Animation -->
        <section id="page3" class="page">
            <div class="couple-animation">
                <img src="https://cdn-icons-png.flaticon.com/512/5753/5753380.png" class="couple-img">
            </div>
            <div class="heart-btn-container" onclick="nextPage(4)">
                <div class="big-heart">
                    <span>Continue<br>Our Story</span>
                </div>
            </div>
        </section>

       
        <!-- Page 4: Photo Frame -->
<section id="page4" class="page">
    <h2 class="gold-text">Frame Our Moment</h2>
    <div class="photo-frame">
        <label for="imageUpload" class="upload-label">
            <input type="file" id="imageUpload" accept="image/*" hidden>
            <!-- Added the cat image here -->
            <div id="imagePreview" class="preview">
                <img src="heloo.jpg.jpeg" alt="Cat in frame">
            </div>
        </label>
    </div>
    <button class="next-btn" onclick="nextPage(5)">NEXT <i class="fas fa-heartbeat"></i></button>
</section>

        <!-- Page 5: Final Shayri -->
        <section id="page5" class="page">
            <div class="stars"></div>
            <div class="shayri-content">
                <p class="shayri-text">
                    तुम्हारी यादों की महक, इस हवा में है,<br>
                    हर धड़कन में बस तू ही बसा है,<br>
                    हम तुम, हमेशा के लिए। ❤️
                </p>
                <div class="hand-heart">
                    <i class="fas fa-heart pulse"></i>
                </div>
                <button class="close-btn" onclick="location.reload()">RESTART</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
